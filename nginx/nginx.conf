events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # Hide Nginx version
    server_tokens off;

    # ── Upstream ──────────────────────────────────────────────────────────────
    upstream inkflow_app {
        server app:3000;
        keepalive 32;
    }

    # ── HTTP server ───────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;                  # catch-all; set your domain in docker-compose

        # Maximum upload size (for avatar uploads etc.)
        client_max_body_size 10M;

        # ── Static assets: served through Next.js but let Nginx cache headers work ──
        location /_next/static/ {
            proxy_pass         http://inkflow_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            add_header         Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Everything else ──────────────────────────────────────────────────
        location / {
            proxy_pass         http://inkflow_app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
        }
    }
}
