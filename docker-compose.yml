version: "3.9"

services:
  # ── PostgreSQL 数据库 ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: inkflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-inkflow}
      POSTGRES_USER:     ${POSTGRES_USER:-inkflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inkflow_user} -d ${POSTGRES_DB:-inkflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inkflow_net

  # ── Next.js 应用 ───────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inkflow_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # 数据库连接 (指向上面的 postgres 服务)
      DATABASE_URL: "postgresql://${POSTGRES_USER:-inkflow_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-inkflow}?schema=public"
      # NextAuth 认证
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL:    ${NEXTAUTH_URL:-http://localhost}
      # Cloudflare R2 (头像上传可选)
      R2_ACCOUNT_ID:        ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID:     ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET:            ${R2_BUCKET:-}
      R2_PUBLIC_URL:        ${R2_PUBLIC_URL:-}
    expose:
      - "3000"
    healthcheck:
      # 【优化】改用 curl，因为我们在 Dockerfile (slim) 里安装了 curl
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/auth/session"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - inkflow_net

  # ── Nginx 反向代理 ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: inkflow_nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # 如需配置 SSL 证书，请取消下面注释
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - inkflow_net

volumes:
  postgres_data:

networks:
  inkflow_net:
    driver: bridge