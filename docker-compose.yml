version: "3.9"

# ============================================================
# InkFlow Forum — Docker Compose
#
# 快速启动:
#   cp .env.example .env        # 填入真实值
#   docker-compose up -d --build
#   docker-compose logs -f
#
# 服务端口 (宿主机):
#   80   — Nginx 反向代理 (对外统一入口)
#   3000 — Next.js 前端 (直接访问，可选)
#   8080 — Spring Boot 后端 (直接访问，可选)
# ============================================================

services:

  # ── PostgreSQL (Next.js / Prisma) ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-inkflow}
      POSTGRES_USER:     ${POSTGRES_USER:-inkflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inkflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MySQL (Spring Boot / MyBatis-Plus) ──────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-inkflow_forum}
      MYSQL_USER:          ${MYSQL_USER:-inkflow}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      # Run DDL on first startup
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER:-inkflow}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      sh -c '
        if [ -n "$$REDIS_PASSWORD" ]; then
          redis-server --requirepass "$$REDIS_PASSWORD"
        else
          redis-server
        fi
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-inkflow_forum}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-inkflow}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST:     redis
      SPRING_DATA_REDIS_PORT:     6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET:                 ${JWT_SECRET}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health 2>/dev/null | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:      postgresql://${POSTGRES_USER:-inkflow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-inkflow}
      NEXTAUTH_SECRET:   ${NEXTAUTH_SECRET}
      NEXTAUTH_URL:      ${NEXTAUTH_URL:-http://localhost}
      # R2 image storage (optional)
      R2_ACCOUNT_ID:         ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID:      ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY:  ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET:             ${R2_BUCKET:-}
      R2_PUBLIC_URL:         ${R2_PUBLIC_URL:-}
    ports:
      - "3000:3000"

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  mysql_data:
  redis_data:
  uploads_data:
