server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: inkflow
  datasource:
    url: jdbc:mysql://localhost:3306/inkflow_forum?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
  mvc:
    static-path-pattern: /uploads/**
  web:
    resources:
      static-locations: file:./uploads/

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml
  global-config:
    db-config:
      id-type: auto

inkflow:
  jwt:
    secret: ${JWT_SECRET:inkflow-jwt-secret-key-2024-must-be-at-least-256-bits-long-for-hs256}
    expiration: 604800
  cors:
    allowed-origins: "*"
  upload:
    path: ./uploads/
